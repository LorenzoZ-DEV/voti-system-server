<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Accesso | Dashboard Voti</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="login-body">
  <main class="login-container" role="main">
    <section class="login-card" aria-labelledby="loginTitle">
      <header class="login-card__header">
        <h1 id="loginTitle">Dashboard Voti</h1>
        <p>Accedi con le credenziali amministratore per gestire i tuoi voti.</p>
      </header>
      <form id="loginForm" class="login-form" novalidate>
        <label class="login-form__field">
          <span class="field-label">Username</span>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </label>
        <label class="login-form__field">
          <span class="field-label">Password</span>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </label>
        <p class="login-form__error" data-error hidden></p>
        <button type="submit" class="login-form__submit">Accedi</button>
      </form>
      <div class="login-card__footer">
        <button type="button" class="btn-theme" data-theme-toggle aria-pressed="false" title="Attiva modalità scura">
          <span class="btn-theme__icon" aria-hidden="true">🌙</span>
          <span class="btn-theme__text" data-theme-label>Modalità scura</span>
        </button>
      </div>
    </section>
  </main>

  <script src="/login.js" defer></script>
</body>
</html>
